<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DG TV Music Live Radio - On Demand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand-mark">DG<span>TV</span></div>
      <div>
        <p class="eyebrow">La web radio del FVG</p>
        <h1>On Demand</h1>
        <p class="subtitle">Riascolta i programmi di DG TV Music Live Radio quando vuoi.</p>
      </div>
    </header>

    <section class="player-card" aria-label="Player On Demand">
      <div class="cover-wrap">
        <img id="cover" class="cover" alt="Copertina programma" />
        <div class="live-pill">● ON DEMAND</div>
      </div>

      <div class="player-info">
        <p id="category" class="category">Programma</p>
        <h2 id="title">Caricamento...</h2>
        <p id="speaker" class="speaker"></p>
        <p id="description" class="description"></p>

        <div class="visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="controls">
          <button id="playBtn" class="play-btn" aria-label="Play o pausa">▶</button>
          <div class="time-area">
            <input id="seek" type="range" value="0" min="0" max="100" step="0.1" aria-label="Avanzamento audio" />
            <div class="time-row"><span id="current">00:00</span><span id="duration">00:00</span></div>
          </div>
        </div>

        <audio id="audio" preload="metadata"></audio>

        <div class="action-row">
          <button id="shareBtn" class="action-btn">Condividi</button>
          <a id="downloadBtn" class="action-btn" download>Scarica</a>
          <a id="whatsappBtn" class="action-btn whatsapp" target="_blank" rel="noopener">WhatsApp</a>
        </div>
      </div>
    </section>

    <section class="programs-section">
      <div class="section-title">
        <h3>Tutti i programmi</h3>
        <input id="search" type="search" placeholder="Cerca programma..." />
      </div>
      <div id="programList" class="program-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
