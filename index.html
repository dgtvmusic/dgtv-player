<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DG TV Music Live Radio - On Demand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand-mark" aria-label="DG TV">DG<span>TV</span></div>
      <div>
        <p class="eyebrow">DG TV Music Live Radio</p>
        <h1>On Demand</h1>
        <p class="subtitle">Programmi, DJ set e speciali sempre disponibili.</p>
      </div>
    </header>

    <section class="player-card" id="playerCard">
      <div class="cover-wrap">
        <img id="cover" class="cover" src="images/demo-cover.jpg" alt="Copertina programma" />
        <div class="live-pill">ON DEMAND</div>
      </div>

      <div class="player-info">
        <p id="category" class="category">DG TV</p>
        <h2 id="title">Seleziona un programma</h2>
        <p id="speaker" class="speaker">DG TV Music Live Radio</p>
        <p id="description" class="description">Scegli una scheda qui sotto e ascolta il programma on demand.</p>

        <div class="visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <audio id="audio" preload="metadata"></audio>

        <div class="controls">
          <button id="playBtn" class="play-btn" aria-label="Play/Pausa">▶</button>
          <div class="time-area">
            <input id="seek" type="range" min="0" max="100" value="0" />
            <div class="time-row"><span id="currentTime">00:00</span><span id="duration">00:00</span></div>
          </div>
        </div>

        <div class="action-row">
          <a class="action-btn" id="siteBtn" href="https://www.dgtvmusic.com" target="_blank" rel="noopener">Sito</a>
          <a class="action-btn whatsapp" id="whatsappBtn" href="#" target="_blank" rel="noopener">WhatsApp</a>
          <button class="action-btn" id="shareBtn">Condividi</button>
        </div>
      </div>
    </section>

    <section class="programs-section">
      <div class="section-title">
        <h3>Tutti i programmi</h3>
        <input id="search" type="search" placeholder="Cerca programma o DJ..." />
      </div>
      <div id="programGrid" class="program-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
