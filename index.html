<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DG TV Music Live Radio | On Demand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="logo">DG<span>TV</span></div>
      <div>
        <p class="kicker">DG TV Music Live Radio</p>
        <h1>On Demand</h1>
        <p class="subtitle">Programmi, DJ set e speciali sempre disponibili.</p>
      </div>
    </header>

    <section class="featured" id="featured">
      <div class="coverBox">
        <img id="cover" src="images/demo-cover.jpg" alt="Copertina programma" />
        <div class="badge">ON DEMAND</div>
      </div>

      <div class="infoBox">
        <p class="category" id="category">DG TV</p>
        <h2 id="title">Seleziona un programma</h2>
        <p class="speaker" id="speaker">DG TV Music Live Radio</p>
        <p class="desc" id="description">Scegli una scheda qui sotto e ascolta il programma on demand.</p>

        <div class="visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="playerControls">
          <button id="playBtn" class="playBtn" aria-label="Play pausa">▶</button>
          <div class="barArea">
            <input id="seek" type="range" min="0" max="100" value="0" />
            <div class="timeRow"><span id="currentTime">00:00</span><span id="duration">00:00</span></div>
          </div>
        </div>

        <audio id="audio"></audio>

        <div class="actions">
          <a id="siteBtn" class="action" href="https://www.dgtvmusic.com" target="_blank" rel="noopener">Sito</a>
          <a id="waBtn" class="action whatsapp" href="#" target="_blank" rel="noopener">WhatsApp</a>
          <button id="shareBtn" class="action" type="button">Condividi</button>
        </div>
      </div>
    </section>

    <section class="programs">
      <div class="sectionHead">
        <h3>Tutti i programmi</h3>
        <input id="search" type="search" placeholder="Cerca programma o DJ..." />
      </div>
      <div id="programGrid" class="programGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
