<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DG TV Music Live Radio - On Demand</title>
  <link rel="stylesheet" href="style.css?v=no-dgtv-final-5" />
</head>
<body>
  <main class="app-shell">

    <header class="hero-banner hero-app">
      <img class="hero-logo" src="images/logo-dgtv.png" alt="DG TV Music Live Radio">
      <div class="hero-copy">
        <span class="hero-line" aria-hidden="true"></span>
        <h1>On Demand</h1>
        <span class="hero-line" aria-hidden="true"></span>
        <p class="subtitle">Programmi, DJ set e speciali sempre disponibili.</p>
      </div>
    </header>

    <section class="player-card" id="playerCard">
      <div class="cover-wrap">
        <img id="cover" class="cover" src="images/demo-cover.jpg" alt="Copertina programma" />
        <span class="live-pill">● ON DEMAND</span>
      </div>

      <div class="player-info">
        <h2 id="title">Seleziona un programma</h2>
        <p id="speaker" class="speaker">DG TV Music Live Radio</p>
        <p id="description" class="description">Scegli una scheda qui sotto e ascolta il programma on demand.</p>

        <div class="visualizer" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>

        <div class="controls">
          <button id="playBtn" class="play-btn" aria-label="Play">▶</button>
          <div class="time-area">
            <input id="seek" type="range" min="0" max="100" value="0" />
            <div class="time-row">
              <span id="currentTime">00:00</span>
              <span id="duration">00:00</span>
            </div>
          </div>
        </div>

        <audio id="audio" preload="metadata"></audio>

        <div class="action-row">
          <a id="siteBtn" class="action-btn live" href="https://www.dgtvmusic.com" target="_blank" rel="noopener">LIVE RADIO</a>
          <a id="whatsappBtn" class="action-btn whatsapp" href="#" target="_blank" rel="noopener">WHATSAPP</a>
          <a id="shareBtn" class="action-btn share" href="https://dgtvmusic.github.io/dgtv-player/" target="_blank" rel="noopener">CONDIVIDI</a>
        </div>
      </div>
    </section>

    <section class="programs-section">
      <div class="section-title">
        <h3>Tutti i programmi</h3>
      </div>

      <div class="slider-wrap">
        <button id="prevBtn" class="slider-arrow left" type="button" aria-label="Programmi precedenti">‹</button>
        <div id="programGrid" class="program-slider"></div>
        <button id="nextBtn" class="slider-arrow right" type="button" aria-label="Programmi successivi">›</button>
      </div>
    </section>

  </main>

  <script src="script.js?v=no-dgtv-final-5"></script>
</body>
</html>
