<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>DG TV Live Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <main id="canvas">
      <div class="grid"></div>
      <div class="glow glow1"></div>
      <div class="glow glow2"></div>

      <div class="live-badge"><span></span>LIVE</div>

      <div class="clock">
        <strong id="time">--:--</strong>
        <small id="date">--</small>
      </div>

      <img class="logo" src="assets/logo.jpg" alt="DG TV Music Live Radio">

      <div class="equalizer" id="equalizer"></div>

      <div class="site-box info-box">
        <small>ASCOLTACI SU</small>
        <strong>www.dgtvmusic.com</strong>
      </div>

      <div class="whatsapp-box info-box">
        <small>WHATSAPP</small>
        <strong>320 802 6411</strong>
      </div>

      <div class="ticker">
        <div>DG TV LIVE RADIO • LA TUA MUSICA • LA TUA RADIO • SEMPRE ON AIR • WWW.DGTVMUSIC.COM • DG TV LIVE RADIO •</div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
