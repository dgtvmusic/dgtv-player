<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>DG TV Live Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>

    <header>
      <div class="live"><span></span> LIVE</div>
      <div class="clock">
        <strong id="time">--:--</strong>
        <small id="date">--</small>
      </div>
    </header>

    <section class="logo-area">
      <img src="assets/logo.jpg" alt="DG TV Music Live Radio">
    </section>

    <section class="eq-wrap">
      <div class="eq" id="eq"></div>
    </section>

    <section class="contact">
      <div>
        <small>ASCOLTACI SU</small>
        <strong>www.dgtvmusic.com</strong>
      </div>
      <div>
        <small>WHATSAPP</small>
        <strong>320 802 6411</strong>
      </div>
    </section>

    <footer>
      <div class="ticker"><span>
        DG TV LIVE RADIO • LA TUA MUSICA • LA TUA RADIO • SEMPRE ON AIR •
        DG TV LIVE RADIO • LA TUA MUSICA • LA TUA RADIO • SEMPRE ON AIR •
      </span></div>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
