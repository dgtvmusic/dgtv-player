<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>DG TV Live Radio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen">
    <header>
      <div class="live"><span></span> LIVE</div>
      <div class="clock">
        <strong id="time">--:--</strong>
        <small id="date">--</small>
      </div>
    </header>

    <section class="logo-wrap">
      <img src="assets/logo.jpg" alt="DG TV Music Live Radio">
    </section>

    <section class="claim">
      <p>LA WEB RADIO DEL</p>
      <h1>FRIULI VENEZIA GIULIA</h1>
    </section>

    <section class="equalizer" id="equalizer" aria-hidden="true"></section>

    <section class="info">
      <div>
        <small>ASCOLTACI SU</small>
        <strong>www.dgtvmusic.com</strong>
      </div>
      <div>
        <small>WHATSAPP</small>
        <strong>320 802 6411</strong>
      </div>
    </section>

    <section class="services">
      <span>MUSICA NON STOP</span>
      <span>NEWS</span>
      <span>METEO</span>
      <span>OROSCOPO</span>
    </section>

    <footer>
      <div class="ticker">
        <div>DG TV LIVE RADIO • LA TUA MUSICA • LA TUA RADIO • SEMPRE ON AIR • WWW.DGTVMUSIC.COM • DG TV LIVE RADIO •</div>
      </div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
